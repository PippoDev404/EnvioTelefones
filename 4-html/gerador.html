<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Distribuidor de Telefones</title>
    <script defer src="/config.js"></script>
    <link rel="stylesheet" href="/1-componentes/global.css" />
    <link rel="stylesheet" href="/3-css/gerador.css" />

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <script defer type="module" src="/2-header-footer/header-footer.js"></script>
    <script defer src="/5-js/db.js"></script>
    <script defer type="module" src="/5-js/gerador.js"></script>
</head>

<body>
    <div id="header"></div>

    <main class="container">
        <section class="card">
            <div class="card-header">
                <h2>Configuração</h2>
                <span class="badge">CSV + Distribuição</span>
            </div>

            <div class="form-grid">
                <div class="field field-full">
                    <label for="baseFile">Arquivo base (.csv)</label>
                    <input id="baseFile" type="file" accept=".csv,text/csv" />
                </div>

                <div class="field">
                    <label for="hasCota">Vai ter cota?</label>
                    <select id="hasCota">
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                </div>

                <div class="field cota-only">
                    <label for="cotaFile">Arquivo COTA (.csv)</label>
                    <input id="cotaFile" type="file" accept=".csv,text/csv" />
                </div>

                <div class="field no-cota-only">
                    <label for="maxNumbersPerPesq">Máximo de telefones por P (sem cota)</label>
                    <input id="maxNumbersPerPesq" type="number" min="1" step="1" placeholder="Ex.: 1200" />
                </div>

                <div class="field">
                    <label for="pesquisaNumbersPerPesq">Máximo de telefones da PESQUISA por P</label>
                    <input
                        id="pesquisaNumbersPerPesq"
                        type="number"
                        min="0"
                        step="1"
                        placeholder="Ex.: 200"
                    />
                    <small class="field-help">
                        Se deixar vazio ou 0, o sistema distribui normalmente todos os números da categoria PESQUISA.
                    </small>
                </div>
            </div>

            <div id="manualDaysSection" class="manual-days hidden">
                <div class="manual-days-header">
                    <h3>Dias de pesquisa</h3>
                    <button id="addDayBtn" class="secondary-btn" type="button">Adicionar novo dia de pesquisa</button>
                </div>

                <div id="manualDaysList" class="days-list"></div>
            </div>

            <div class="actions">
                <button id="processBtn" class="primary-btn" type="button">Processar arquivo</button>
                <button id="downloadBtn" class="secondary-btn hidden" type="button">Download do arquivo final</button>
            </div>

            <div id="logBox" class="log-box hidden"></div>
        </section>

        <section id="previewSection" class="card hidden">
            <div class="card-header">
                <h2>Pré-visualização</h2>
                <span class="badge">30 primeiras linhas</span>
            </div>

            <div id="previewMeta" class="preview-meta hidden"></div>
            <div id="previewTableWrapper"></div>
        </section>
    </main>

    <div id="footer"></div>
</body>

</html>
