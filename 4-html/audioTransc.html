<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcrição de Áudios</title>
  <script defer src="/config.js"></script>
  <link rel="icon" type="image/png" sizes="32x32" href="/0-imgs/IconIBESPE.jpg">

  <link rel="stylesheet" href="/3-css/audioTransc.css" />
  <link rel="stylesheet" href="/1-componentes/global.css">
  <script defer type="module" src="/2-header-footer/header-footer.js"></script>
  <script defer src="/5-js/db.js"></script>
  <script defer type="module" src="/5-js/audioTransc.js"></script>
</head>

<body>
  <div id="header"></div>

  <main class="PaginaAuditoria">
    <section class="CardAuditoria">
      <div class="TopoAuditoria">
        <div>
          <p class="Eyebrow">IBESPE • Transcrição Inteligente</p>
          <h1>Envie os áudios para transcrever</h1>
          <p class="Subtitulo">
            Os áudios são transcritos diretamente no navegador, sem envio para n8n.
          </p>
        </div>
      </div>

      <form id="formAuditoria" class="FormularioAuditoria">
        <div class="GridCampos">
          <div class="CampoArquivo">
            <label for="audio">Arquivos de áudio</label>
            <input
              type="file"
              id="audio"
              name="audio"
              accept=".mp3,.wav,.m4a,.mpeg,.mp4,.webm"
              multiple
              required
            />
            <small>Você pode enviar até 5 áudios por vez.</small>
          </div>
        </div>

        <div class="AcoesFormulario" style="display:flex; gap:12px; flex-wrap:wrap;">
          <button class="BotaoPrimario" id="btnEnviar" type="submit">
            Transcrever áudios
          </button>

          <button class="BotaoPrimario" id="btnDownloadTranscricoes" type="button" disabled>
            Baixar todas as transcrições
          </button>
        </div>
      </form>

      <div id="statusBox" class="StatusBox status-neutro">
        Aguardando envio dos arquivos.
      </div>

      <section class="ResultadoWrapperSingle">
        <div class="ResultadoColuna">
          <h2>Transcrições</h2>
          <div id="resultadoContainer" class="ListaResultados">
            <div class="BlocoEntrevistaPlaceholder">
              As transcrições aparecerão aqui em blocos separados.
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div id="footer"></div>
</body>

</html>
